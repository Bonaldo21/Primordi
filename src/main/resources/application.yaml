spring:
  application:
    name: primordi-api

  datasource:
    url: jdbc:mysql://localhost:3306/primordi?useSSL=false&serverTimezone=America/Sao_Paulo&useUnicode=true&characterEncoding=utf8
    username: root
    password: ${DB_PASSWORD:Caualindao2703.}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api


primordi:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200}
  jwt:
    secret: ${JWT_SECRET:troque-essa-chave-secreta-em-producao-com-pelo-menos-256-bits-seguros-aqui}
    expiration-ms: 3600000           # 1 hora
    refresh-expiration-ms: 604800000 # 7 dias


  mercado-pago:
    access-token: ${MP_ACCESS_TOKEN:SEU_TOKEN_AQUI}

# Logs
logging:
  level:
    com.primordi.api: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: INFO

# Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

# ===========================================
# Mercado Pago
# ===========================================
mercadopago:
  access-token: ${MP_ACCESS_TOKEN:TEST-0000000000000000-000000-00000000000000000000000000000000-000000000}
  public-key: ${MP_PUBLIC_KEY:TEST-00000000-0000-0000-0000-000000000000}
  webhook-secret: ${MP_WEBHOOK_SECRET:}
  notification-url: ${MP_NOTIFICATION_URL:http://localhost:8080/api/pagamentos/webhook}
  success-url: ${APP_FRONT_URL:http://localhost:3000}/pagamento/sucesso
  failure-url: ${APP_FRONT_URL:http://localhost:3000}/pagamento/falha
  pending-url: ${APP_FRONT_URL:http://localhost:3000}/pagamento/pendente
  sandbox: ${MP_SANDBOX:true}

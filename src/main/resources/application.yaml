spring:
  application:
    name: primordi-api

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB       # era padrão 1MB — agora suporta imagens de alta qualidade
      max-request-size: 50MB    # limite total da requisição (múltiplas imagens)

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api


cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dyv4m7xia}
  api-key: ${CLOUDINARY_API_KEY:183475486413766}
  api-secret: ${CLOUDINARY_API_SECRET:O9CMTNdyTkELKKZDp2Lj6DxbT50}

primordi:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:https://front-production-5ab2.up.railway.app,http://localhost:3000,http://localhost:5173,http://localhost:4200}
  jwt:
    secret: ${JWT_SECRET:troque-essa-chave-secreta-em-producao-com-pelo-menos-256-bits-seguros-aqui}
    expiration-ms: 3600000           # 1 hora
    refresh-expiration-ms: 604800000 # 7 dias



# Logs
logging:
  level:
    com.primordi.api: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: INFO

# Swagger
# Adicione ao application.yaml se quiser desabilitar:
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false


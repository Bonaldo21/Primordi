spring:
  application:
    name: primordi-api

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    repair-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    context-path: /api


primordi:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200}
  jwt:
    secret: ${JWT_SECRET:troque-essa-chave-secreta-em-producao-com-pelo-menos-256-bits-seguros-aqui}
    expiration-ms: 3600000           # 1 hora
    refresh-expiration-ms: 604800000 # 7 dias


  mercado-pago:
    access-token: ${MP_ACCESS_TOKEN:SEU_TOKEN_AQUI}

# Logs
logging:
  level:
    com.primordi.api: DEBUG
    org.hibernate.SQL: DEBUG
    org.springframework.security: INFO

# Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
  api-docs:
    path: /v3/api-docs

# ===========================================
# Mercado Pago
# ===========================================
mercadopago:
  access-token: ${MP_ACCESS_TOKEN:APP_USR-68048578315510-060118-bb912b283ec76ee631d1ee41e15c3590-3438706958}
  public-key: ${MP_PUBLIC_KEY:APP_USR-6f411413-55d9-4619-b2a1-7ee93bb66f4c}
  webhook-secret: ${MP_WEBHOOK_SECRET:}
  notification-url: ${MP_NOTIFICATION_URL:}
  success-url: ${APP_FRONT_URL:http://localhost:3000}/pagamento/sucesso
  failure-url: ${APP_FRONT_URL:http://localhost:3000}/pagamento/falha
  pending-url: ${APP_FRONT_URL:http://localhost:3000}/pagamento/pendente
  sandbox: ${MP_SANDBOX:true}



frete:
  fixo:
    habilitado: true
    valor-base: 25.00
    valor-por-kg: 5.00
    prazo-dias: 7

  correios:
    habilitado: false
    contrato: ${CORREIOS_CONTRATO:}
    senha: ${CORREIOS_SENHA:}
    cep-origem: ${CORREIOS_CEP_ORIGEM:01310100}
    api-url: https://api.correios.com.br

  melhor-envio:
    habilitado: false
    token: ${MELHOR_ENVIO_TOKEN:}
    sandbox: true
